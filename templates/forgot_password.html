{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center;">🔐 Восстановление пароля</h2>
    <p style="text-align: center; margin-bottom: 20px;">Введите ваш email, и мы отправим инструкции по восстановлению</p>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Email</label>
            <input type="email" name="email" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Отправить</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('login') }}">Вернуться ко входу</a>
    </p>
</div>
{% endblock %}
