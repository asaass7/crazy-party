{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="text-align: center;">📝 Регистрация</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Имя *</label>
            <input type="text" name="username" required style="width: 100%; padding: 10px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Email *</label>
            <input type="email" name="email" required style="width: 100%; padding: 10px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Телефон *</label>
            <input type="tel" name="phone" id="phone" required style="width: 100%; padding: 10px;" placeholder="+7 (___) ___-__-__">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Пароль *</label>
            <input type="password" name="password" required style="width: 100%; padding: 10px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>Подтверждение пароля *</label>
            <input type="password" name="confirm_password" required style="width: 100%; padding: 10px;">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </p>
</div>
<script>
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 11) val = val.slice(0, 11);
        let formatted = '';
        if (val.length > 0) formatted = '+7';
        if (val.length > 1) formatted += ' (' + val.slice(1, 4);
        if (val.length >= 5) formatted += ') ' + val.slice(4, 7);
        if (val.length >= 8) formatted += '-' + val.slice(7, 9);
        if (val.length >= 10) formatted += '-' + val.slice(9, 11);
        e.target.value = formatted;
    });
</script>
{% endblock %}
