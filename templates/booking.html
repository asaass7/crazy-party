{% extends "base.html" %}

{% block title %}Бронирование{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="text-align: center;">📅 Бронирование аниматора</h2>
    <p style="text-align: center;">Аниматор: <strong>{{ animator_name }}</strong></p>
    <p style="text-align: center;">Услуга: <strong>{{ service_type }}</strong></p>
    
    <form method="POST">
        <div class="form-group" style="margin-bottom: 1rem;">
            <label>Выберите дату:</label>
            <input type="date" name="booking_date" min="{{ now }}" 
                   style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);" required>
        </div>
        <div class="form-group" style="margin-bottom: 1rem;">
            <label>Выберите время:</label>
            <input type="time" name="booking_time" 
                   style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Подтвердить бронирование</button>
    </form>
</div>

<script>
    const today = new Date().toISOString().split('T')[0];
    document.querySelector('input[name="booking_date"]').min = today;
</script>
{% endblock %}
