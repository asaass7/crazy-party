{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center;">🔑 Вход в систему</h2>
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>Email</label>
            <input type="email" name="email" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);" required>
        </div>
        <div style="margin-bottom: 15px;">
            <label>Пароль</label>
            <input type="password" name="password" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color);" required>
        </div>
        <button type="submit" class="btn" style="width: 100%;">Войти</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">
        <a href="{{ url_for('forgot_password') }}">Забыли пароль?</a>
    </p>
    <p style="text-align: center; margin-top: 15px;">
        Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
